services:
  price_flow:
    image: vlnag/boutique_price_flow:latest
    env_file:
      - ./.env.price_flow
    volumes:
      - price-flow-logs-data:/app/src/logs
    ports:
     - 8000:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health/health', timeout=2).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 50s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy

  price_flow-migrations:
    image: vlnag/boutique_price_flow:latest
    env_file:
      - ./.env.price_flow
    working_dir: /app/src
    restart: no
    depends_on:
      db:
        condition: service_healthy
    command: |
      sh -c "
        alembic upgrade head &&
        echo 'Migrations completed successfully'
      "

  converter:
    image: vlnag/boutique_converter:latest
    env_file:
      - ./.env.converter
    volumes:
      - converter-logs-data:/opt/app/logs
      - converter-data:/opt/app/data
    ports:
     - 8090:8000
    depends_on:
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy

  upd_sites:
    image: vlnag/boutique_updating_sites:latest
    env_file:
      - ./.env.upd_sites
    volumes:
      - upd-sites-logs-data:/opt/app/logs
      - upd-sites-data:/opt/app/data
    ports:
     - 8080:8000
    depends_on:
      seq:
        condition: service_healthy

  db:
    image: postgres:17.4-bookworm
    ports:
     - 5442:5432
    env_file:
      - ./.env.price_flow
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -U $${POSTGRES_USER} -c select 1 -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      start_period: 0s
      timeout: 10s

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --appendonly yes --notify-keyspace-events AKE
    volumes:
      - redis-data:/data
    healthcheck:
        test: |
          redis-cli -a ${REDIS_PASSWORD} ping | grep PONG
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  seq:
    image: datalust/seq:latest
    volumes:
      - seq-data:/data
    env_file:
      - ./.env.price_flow
    ports:
      - "5341:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 5s   # Проверять каждые 5 секунд
      timeout: 2s    # Таймаут проверки
      retries: 5     # Количество неудачных попыток перед пометкой как unhealthy
    restart: unless-stopped

volumes:
  price-flow-logs-data:
  converter-logs-data:
  converter-data:
  upd-sites-logs-data:
  upd-sites-data:
  db_data:
  redis-data:
  seq-data:
