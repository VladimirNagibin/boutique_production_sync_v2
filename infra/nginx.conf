server {
    listen 80;
    # server_tokens off;

    # -------------------------------------------------
    # 1. Прокси для админки price_flow (прямой доступ)
    #    http://ваш-ip/admin/
    # -------------------------------------------------
    # location /price/admin/ {
    #     proxy_pass http://price_flow:8000/admin/;
    #     proxy_set_header Host $host;
    #     sub_filter_once off;
    #     sub_filter_types text/html text/css application/javascript;
    #     sub_filter '/admin/' '/price/admin/';
    #     # Если нужно также менять ссылки на /static/ -> /price/static/
    #     # sub_filter '/static/' '/price/static/';
    #     # proxy_set_header X-Real-IP $remote_addr;
    #     # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     # proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # -------------------------------------------------
    # 2. Прокси для админки upd_sites (прямой доступ)
    #    http://ваш-ip/api/v1/tiny/admin/db/
    # -------------------------------------------------
    location /upd-sites/admin/ {
        proxy_pass http://upd_sites:8000/api/v1/tiny/admin/db/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Подмена абсолютных ссылок в ответах
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/css;
        sub_filter '/api/v1/tiny/admin/db/' '/upd-sites/admin/';

        # Если нужен редирект на префикс тоже подменять
        proxy_redirect http://upd_sites:8000/api/v1/tiny/admin/db/ /upd-sites/admin/;
    }

    # -------------------------------------------------
    # 3. Прокси для сервиса price_flow (всё остальное)
    #    http://ваш-ip/price/ -> price_flow:8000/
    # -------------------------------------------------
    location /price/ {
        proxy_pass http://price_flow:8000/;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
        # Если нужен WebSocket, добавьте:
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
        proxy_redirect http://price_flow:8000/ /price/;
        proxy_redirect http://price_flow:8000/admin/ /price/admin/;
        # или общий паттерн:
        proxy_redirect ~^http://price_flow:8000/(.*)$ /price/$1;
    }

    # -------------------------------------------------
    # 4. Прокси для сервиса converter
    #    http://ваш-ip/converter/ -> converter:8000/
    # -------------------------------------------------
    location /converter/ {
        proxy_pass http://converter:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------
    # 5. Прокси для сервиса upd_sites (всё остальное)
    #    http://ваш-ip/upd/ -> upd_sites:8000/
    # -------------------------------------------------
    location /upd/ {
        proxy_pass http://upd_sites:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------
    # 6. Прокси для Seq (веб-интерфейс логирования)
    #    http://ваш-ip/seq/ -> seq:80/
    # -------------------------------------------------
    location /seq/ {
        proxy_pass http://seq:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Для Seq может потребоваться дополнительный заголовок:
        # proxy_set_header X-Forwarded-Host $host;
        # proxy_set_header X-Forwarded-Port $server_port;
    }

    # -------------------------------------------------
    # 7. Корневой путь – можно отдать заглушку или редирект
    # -------------------------------------------------
    location / {
        return 200 'Welcome to unified API gateway. Available: /price/, /converter/, /upd/, /seq/, /price/admin/, /upd-sites/admin/';
        add_header Content-Type text/plain;
    }
}
